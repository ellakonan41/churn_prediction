services:
  api:
    build: .
    container_name: churn-api
    ports:
      - "8000:8000"

  dashboard:
    build: .
    container_name: churn-dashboard
    command: streamlit run dashboard/streamlit_app.py --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api